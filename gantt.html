<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GStreet Platform — Project Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #041E42;
  --navy-90: rgba(4,30,66,0.9);
  --navy-60: rgba(4,30,66,0.6);
  --navy-30: rgba(4,30,66,0.3);
  --navy-10: rgba(4,30,66,0.08);
  --gray: #54585A;
  --gray-light: #8B8F92;
  --green: #059669;
  --green-bg: #ECFDF5;
  --amber: #D97706;
  --amber-bg: #FFFBEB;
  --blue: #2563EB;
  --blue-bg: #EFF6FF;
  --purple: #7C3AED;
  --red: #DC2626;
  --bg: #F8F9FB;
  --white: #FFFFFF;
  --border: #E5E7EB;
  --border-light: #F3F4F6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Instrument Sans', sans-serif; background: var(--bg); color: var(--navy); min-height: 100vh; }
.header { background: var(--navy); padding: 32px 48px 28px; position: relative; overflow: hidden; }
.header::after { content: ''; position: absolute; top: -40%; right: -5%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%); pointer-events: none; }
.header h1 { font-size: 24px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
.header .subtitle { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 6px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px; }
.stats-row { display: flex; gap: 40px; margin-top: 20px; }
.stat-item .num { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
.stat-item .label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.header-links { display: flex; gap: 12px; margin-top: 20px; }
.header-links a { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: rgba(255,255,255,0.85); font-size: 12px; font-weight: 500; text-decoration: none; transition: all 0.2s; }
.header-links a:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.3); color: #fff; }
.status-bar { display: flex; align-items: center; gap: 24px; padding: 14px 48px; background: var(--white); border-bottom: 1px solid var(--border); font-size: 12px; color: var(--gray); }
.status-item { display: flex; align-items: center; gap: 6px; }
.status-dot { width: 10px; height: 10px; border-radius: 3px; }
.status-dot.complete { background: var(--green); }
.status-dot.active { background: var(--amber); }
.status-dot.planned { background: var(--blue); }
.status-dot.future { background: var(--navy-30); }
.gantt-wrap { padding: 32px 48px 60px; overflow-x: auto; }
.gantt { display: grid; grid-template-columns: 280px 1fr; min-width: 1200px; }
.date-header-spacer { border-bottom: 2px solid var(--navy); }
.date-header { display: flex; border-bottom: 2px solid var(--navy); margin-bottom: 4px; }
.date-col { text-align: center; padding: 10px 0; font-size: 11px; font-weight: 600; color: var(--gray); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px; border-right: 1px solid var(--border-light); }
.phase-header { grid-column: 1 / -1; padding: 20px 0 8px; display: flex; align-items: baseline; gap: 10px; border-bottom: 1px solid var(--border); }
.phase-header:first-of-type { padding-top: 8px; }
.phase-name { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
.phase-dates { font-size: 11px; color: var(--gray-light); font-family: 'JetBrains Mono', monospace; }
.phase-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.phase-badge.complete { background: var(--green-bg); color: var(--green); }
.phase-badge.active { background: var(--amber-bg); color: var(--amber); }
.phase-badge.planned { background: var(--blue-bg); color: var(--blue); }
.row-label { padding: 7px 16px 7px 0; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-label .status-pip { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.row-label .detail { font-size: 10px; color: var(--gray-light); font-family: 'JetBrains Mono', monospace; margin-left: auto; flex-shrink: 0; }
.row-bar { position: relative; border-bottom: 1px solid var(--border-light); height: 34px; }
.bar { position: absolute; top: 7px; height: 20px; border-radius: 4px; cursor: pointer; min-width: 8px; transition: opacity 0.15s, transform 0.15s; }
.bar:hover { opacity: 1 !important; transform: scaleY(1.2); z-index: 10; }
.bar.complete { background: var(--green); opacity: 0.8; }
.bar.active { background: var(--amber); opacity: 0.85; background-image: repeating-linear-gradient(-45deg, transparent, transparent 4px, rgba(255,255,255,0.15) 4px, rgba(255,255,255,0.15) 8px); }
.bar.planned { background: var(--blue); opacity: 0.6; }
.bar.future { background: var(--navy); opacity: 0.2; border: 1px dashed var(--navy-30); }
.today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--red); z-index: 20; pointer-events: none; }
.today-marker { position: absolute; top: -2px; left: -14px; font-size: 9px; font-weight: 700; color: var(--red); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px; }
.milestone { position: absolute; width: 10px; height: 10px; background: var(--navy); transform: rotate(45deg); border: 2px solid var(--white); box-shadow: 0 1px 4px rgba(0,0,0,0.15); cursor: pointer; z-index: 15; top: 12px; }
.tooltip { display: none; position: fixed; z-index: 100; background: var(--navy); color: #fff; padding: 10px 14px; border-radius: 8px; font-size: 12px; line-height: 1.5; max-width: 280px; box-shadow: 0 8px 24px rgba(4,30,66,0.25); pointer-events: none; }
.tooltip.show { display: block; }
.tooltip .tt-title { font-weight: 600; margin-bottom: 2px; }
.tooltip .tt-meta { font-size: 10px; color: rgba(255,255,255,0.6); font-family: 'JetBrains Mono', monospace; }
.tooltip .tt-items { margin-top: 6px; font-size: 11px; color: rgba(255,255,255,0.8); }
</style>
</head>
<body>
<div class="header">
  <h1>GStreet Platform — Project Timeline</h1>
  <div class="subtitle">gstreet-ops/trivia-app · Feb 7, 2026 → Ongoing</div>
  <div class="stats-row">
    <div class="stat-item"><div class="num">163</div><div class="label">Commits</div></div>
    <div class="stat-item"><div class="num">33</div><div class="label">Tables</div></div>
    <div class="stat-item"><div class="num">15</div><div class="label">Admin Tabs</div></div>
    <div class="stat-item"><div class="num">9</div><div class="label">Widgets</div></div>
    <div class="stat-item"><div class="num">4</div><div class="label">Tiers</div></div>
  </div>
  <div class="header-links">
    <a href="https://gstreet-ops.github.io/trivia-app" target="_blank">▶ Trivia Platform</a>
    <a href="https://gstreet-ops.github.io/gstreet-ops-quiz-embed/#/admin" target="_blank">▶ Embed Admin</a>
    <a href="https://gstreet-ops.github.io/ellie-hallaron-website/index.html" target="_blank">▶ Hallaron Site</a>

</div>
<div class="status-bar">
  <div class="status-item"><div class="status-dot complete"></div>Complete</div>
  <div class="status-item"><div class="status-dot active"></div>In Progress</div>
  <div class="status-item"><div class="status-dot planned"></div>Planned</div>
  <div class="status-item"><div class="status-dot future"></div>Future</div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:6px">

    <span style="font-weight:600;color:var(--red)">Today</span>
  </div>
</div>
<div class="gantt-wrap"><div class="gantt" id="gantt"></div></div>
<div class="tooltip" id="tooltip"></div>
<script>
const START = new Date('2026-02-07');
const END   = new Date('2026-06-01');
const TODAY = new Date('2026-03-02');
const TOTAL_DAYS = Math.ceil((END - START) / 864e5);
function dayOffset(ds) { return Math.max(0, Math.ceil((new Date(ds) - START) / 864e5)); }
function pct(days) { return (days / TOTAL_DAYS * 100) + '%'; }
const PHASES = [
  {name:'Foundation',status:'complete',start:'2026-02-07',end:'2026-02-14',color:'#041E42',items:[
    {n:'Auth & Accounts',s:'2026-02-07',e:'2026-02-10',status:'complete',detail:'Supabase Auth, profiles, privacy'},
    {n:'Database Schema & RLS',s:'2026-02-10',e:'2026-02-12',status:'complete',detail:'9 initial tables, triggers, RLS policies'},
    {n:'GitHub Pages Deploy',s:'2026-02-12',e:'2026-02-13',status:'complete',detail:'CI/CD, favicon, Georgetown palette'},
    {n:'Documentation Suite',s:'2026-02-13',e:'2026-02-14',status:'complete',detail:'Schema, user guide, commissioner guide'},
  ]},
  {name:'Core Platform',status:'complete',start:'2026-02-14',end:'2026-02-19',color:'#2563EB',items:[
    {n:'Quiz Engine',s:'2026-02-14',e:'2026-02-15',status:'complete',detail:'API + community sources, categories, difficulty'},
    {n:'Dashboard & Charts',s:'2026-02-15',e:'2026-02-16',status:'complete',detail:'Stats, Recharts trend + category charts'},
    {n:'Communities & Leagues',s:'2026-02-14',e:'2026-02-16',status:'complete',detail:'Create, join, leaderboards, invite codes'},
    {n:'Commissioner Dashboard',s:'2026-02-16',e:'2026-02-18',status:'complete',detail:'CSV import, questions, members, analytics'},
    {n:'Admin Dashboard',s:'2026-02-17',e:'2026-02-18',status:'complete',detail:'User management, question review queue'},
    {n:'Achievements & Profiles',s:'2026-02-18',e:'2026-02-19',status:'complete',detail:'6 badges, user profiles, game review'},
  ]},
  {name:'Social & Multiplayer',status:'complete',start:'2026-02-19',end:'2026-02-25',color:'#7C3AED',items:[
    {n:'Real-time Community Chat',s:'2026-02-19',e:'2026-02-20',status:'complete',detail:'Supabase Realtime, moderation, 500-char limit'},
    {n:'Multiplayer Lobby',s:'2026-02-20',e:'2026-02-22',status:'complete',detail:'Room creation, join, ready, open rooms browser'},
    {n:'Live Multiplayer Game',s:'2026-02-22',e:'2026-02-24',status:'complete',detail:'Sync play, scoring, speed bonus, final results'},
    {n:'Community Marketplace',s:'2026-02-24',e:'2026-02-25',status:'complete',detail:'Browse, search, filter, request system'},
    {n:'Notifications & Email',s:'2026-02-24',e:'2026-02-25',status:'complete',detail:'In-app + Resend email, 6 notification types'},
    {n:'Dark Mode & SVG Icons',s:'2026-02-24',e:'2026-02-25',status:'complete',detail:'30+ icons, CSS custom properties, persistence'},
  ]},
  {name:'Media & Content',status:'complete',start:'2026-02-25',end:'2026-02-26',color:'#059669',items:[
    {n:'Media Questions',s:'2026-02-25',e:'2026-02-25',status:'complete',detail:'Image upload, YouTube embed, media library'},
    {n:'Question Explanations',s:'2026-02-25',e:'2026-02-25',status:'complete',detail:'Quiz, multiplayer, game review display'},
    {n:'AI Question Generator',s:'2026-02-25',e:'2026-02-26',status:'complete',detail:'Prompt wizard, request/approval flow'},
    {n:'Season Reset & Archives',s:'2026-02-25',e:'2026-02-26',status:'complete',detail:'RPC, frozen leaderboards, season history'},
  ]},
  {name:'Security & Quality',status:'complete',start:'2026-02-24',end:'2026-03-01',color:'#DC2626',items:[
    {n:'Code Review (2 rounds)',s:'2026-02-24',e:'2026-02-27',status:'complete',detail:'Auth gates, MIME validation, race conditions'},
    {n:'Bot Prevention',s:'2026-02-25',e:'2026-02-26',status:'complete',detail:'Rate limiting, timing analysis, auto-flagging'},
    {n:'Legal Framework',s:'2026-02-25',e:'2026-02-26',status:'complete',detail:'ToS, Privacy Policy, signup consent'},
    {n:'A11y & WCAG AA',s:'2026-02-26',e:'2026-02-27',status:'complete',detail:'ARIA dialogs, keyboard nav, contrast checks'},
    {n:'Role System (RBAC)',s:'2026-02-27',e:'2026-03-01',status:'complete',detail:'platform_role, community roles, permissions.js'},
  ]},
  {name:'Phase 1 · Embed & Site Tools',status:'complete',start:'2026-02-26',end:'2026-02-28',color:'#6C5CE7',items:[
    {n:'Embed Admin Panel (15 tabs)',s:'2026-02-26',e:'2026-02-27',status:'complete',detail:'Setup wizard, tier gating, mobile responsive'},
    {n:'6 Site Tool Widgets',s:'2026-02-27',e:'2026-02-28',status:'complete',detail:'Banner, subscribe, contact, events, content, analytics'},
    {n:'Embed Profiles & Theming',s:'2026-02-27',e:'2026-02-28',status:'complete',detail:'Multi-profile, auto-migration, live preview'},
    {n:'4-Tier Hierarchy',s:'2026-02-28',e:'2026-02-28',status:'complete',detail:'Lite/Pro/Business/Platform with tab gating'},
  ]},
  {name:'Phase 2 · Connections',status:'active',start:'2026-03-01',end:'2026-03-09',color:'#D97706',items:[
    {n:'Integrations Tab',s:'2026-03-01',e:'2026-03-01',status:'complete',detail:'GA4, SEO check, Zapier, meta tags, platform guides'},
    {n:'Standalone Widgets (3)',s:'2026-03-01',e:'2026-03-02',status:'complete',detail:'Leaderboard, achievements, feed web components'},
    {n:'Cross-Widget Analytics',s:'2026-03-02',e:'2026-03-02',status:'complete',detail:'Funnel, timeline, export, business+ gated'},
    {n:'Granular RBAC',s:'2026-03-02',e:'2026-03-02',status:'complete',detail:'PermissionContext, RolesTab, Members integration'},
    {n:'New Badges (Grand Master + Community)',s:'2026-03-02',e:'2026-03-03',status:'active',detail:'2 new achievement badges'},
    {n:'Docs & Roadmap Sync',s:'2026-03-02',e:'2026-03-03',status:'active',detail:'Align docs with actual shipped features'},
    {n:'Email Platform API Sync',s:'2026-03-04',e:'2026-03-07',status:'planned',detail:'Mailchimp/ConvertKit live API (beyond CSV)'},
    {n:'Stripe Connect',s:'2026-03-06',e:'2026-03-09',status:'planned',detail:'Paid community access, revenue dashboard'},
  ]},
  {name:'Phase 3 · Depth',status:'planned',start:'2026-03-10',end:'2026-03-31',color:'#2563EB',items:[
    {n:'Campaign Email Builder',s:'2026-03-10',e:'2026-03-14',status:'planned',detail:'Segmentation, templates, scheduling'},
    {n:'Advanced Analytics',s:'2026-03-14',e:'2026-03-19',status:'planned',detail:'Cohorts, funnels, retention curves'},
    {n:'Scheduled Quizzes',s:'2026-03-19',e:'2026-03-23',status:'planned',detail:'Commissioner sets time, synced play'},
    {n:'Streak Tracking & Badges',s:'2026-03-23',e:'2026-03-26',status:'planned',detail:'Daily play streaks with rewards'},

  {name:'Phase 4 · Scale',status:'future',start:'2026-04-01',end:'2026-05-15',color:'#041E42',items:[
    {n:'Discussion Forums',s:'2026-04-01',e:'2026-04-10',status:'future',detail:'Threaded community discussions'},
    {n:'Visual Workflow Builder',s:'2026-04-10',e:'2026-04-20',status:'future',detail:'Automation pipelines for site owners'},
    {n:'Widget Studio',s:'2026-04-20',e:'2026-04-30',status:'future',detail:'Conditional display, A/B testing'},
    {n:'Mobile App (React Native)',s:'2026-05-01',e:'2026-05-15',status:'future',detail:'iOS + Android native apps'},
  ]},
];
const MILESTONES = [
  {n:'First Commit',d:'2026-02-07'},{n:'MVP Live',d:'2026-02-14'},{n:'Multiplayer Launch',d:'2026-02-24'},
  {n:'Embed System',d:'2026-02-26'},{n:'Site Tools Shipped',d:'2026-02-28'},{n:'Phase 2 Analytics',d:'2026-03-02'},
];
const gantt = document.getElementById('gantt');
const tooltip = document.getElementById('tooltip');
function showTooltip(e, html) { tooltip.innerHTML = html; tooltip.classList.add('show'); const rect = tooltip.getBoundingClientRect(); tooltip.style.left = Math.min(e.clientX + 12, window.innerWidth - rect.width - 20) + 'px'; tooltip.style.top = (e.clientY - rect.height - 12) + 'px'; }
function hideTooltip() { tooltip.classList.remove('show'); }
const spacer = document.createElement('div'); spacer.className = 'date-header-spacer'; gantt.appendChild(spacer);
const dateHeader = document.createElement('div'); dateHeader.className = 'date-header';
const months = []; let cursor = new Date(START);
while (cursor <= END) { const monthStart = new Date(cursor.getFullYear(), cursor.getMonth(), 1); const nextMonth = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1); const effectiveStart = monthStart < START ? START : monthStart; const effectiveEnd = nextMonth > END ? END : nextMonth; const startDay = dayOffset(effectiveStart.toISOString().slice(0,10)); const endDay = dayOffset(effectiveEnd.toISOString().slice(0,10)); months.push({ label: effectiveStart.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }), span: endDay - startDay }); cursor = nextMonth; }
months.forEach(m => { const col = document.createElement('div'); col.className = 'date-col'; col.style.flex = m.span; col.textContent = m.label; dateHeader.appendChild(col); });
gantt.appendChild(dateHeader);
const msLabel = document.createElement('div'); msLabel.className = 'row-label'; msLabel.innerHTML = '<span class="status-pip" style="background:var(--navy)"></span><span style="font-weight:600">Milestones</span>'; gantt.appendChild(msLabel);
const msBar = document.createElement('div'); msBar.className = 'row-bar'; msBar.style.height = '36px';
MILESTONES.forEach(m => { const d = document.createElement('div'); d.className = 'milestone'; d.style.left = pct(dayOffset(m.d)); d.addEventListener('mousemove', e => showTooltip(e, '<div class="tt-title">'+m.n+'</div><div class="tt-meta">'+m.d+'</div>')); d.addEventListener('mouseleave', hideTooltip); msBar.appendChild(d); });
const todayLine = document.createElement('div'); todayLine.className = 'today-line'; todayLine.style.left = pct(dayOffset('2026-03-02')); const todayMarker = document.createElement('div'); todayMarker.className = 'today-marker'; todayMarker.textContent = 'TODAY'; todayLine.appendChild(todayMarker); msBar.appendChild(todayLine);
gantt.appendChild(msBar);
PHASES.forEach(phase => {
  const ph = document.createElement('div'); ph.className = 'phase-header';
  ph.innerHTML = '<span class="phase-name" style="color:'+phase.color+'">'+phase.name+'</span><span class="phase-dates">'+phase.start.slice(5)+' → '+phase.end.slice(5)+'</span><span class="phase-badge '+phase.status+'">'+(phase.status==='active'?'In Progress':phase.status==='complete'?'Complete':phase.status==='planned'?'Planned':'Future')+'</span>';
  gantt.appendChild(ph);
  phase.items.forEach(item => {
    const label = document.createElement('div'); label.className = 'row-label';
    const pipColor = item.status==='complete'?'var(--green)':item.status==='active'?'var(--amber)':item.status==='planned'?'var(--blue)':'var(--navy-30)';
    const checkmark = item.status==='complete'?'✓':item.status==='active'?'◌':'';
    label.innerHTML = '<span class="status-pip" style="background:'+pipColor+'"></span><span>'+item.n+'</span><span class="detail">'+checkmark+'</span>';
    gantt.appendChild(label);
    const barArea = document.createElement('div'); barArea.className = 'row-bar';
    const so = dayOffset(item.s), eo = dayOffset(item.e), dur = Math.max(1, eo - so + 1);
    const bar = document.createElement('div'); bar.className = 'bar '+item.status; bar.style.left = pct(so); bar.style.width = pct(dur);
    bar.addEventListener('mousemove', e => showTooltip(e, '<div class="tt-title">'+item.n+'</div><div class="tt-meta">'+item.s+' → '+item.e+'</div><div class="tt-items">'+item.detail+'</div>'));
    bar.addEventListener('mouseleave', hideTooltip);
    barArea.appendChild(bar);
    const tl = document.createElement('div'); tl.className = 'today-line'; tl.style.left = pct(dayOffset('2026-03-02')); barArea.appendChild(tl);
    gantt.appendChild(barArea);
  });
});
</script>
</body>
